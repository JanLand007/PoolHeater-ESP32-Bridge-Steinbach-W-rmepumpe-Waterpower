esphome:
  name: poolheizung
  friendly_name: Poolheizung

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable Home Assistant API
api:
  encryption:
    key: ""

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 18.5dBm
  fast_connect: true
  reboot_timeout: 30min  # Startet den ESP nach 30 Min ohne WLAN neu
  # Enable fallback hotspot (captive portal) in case wifi connection fails
#  ap:
#    ssid: "Poolheizung Fallback Hotspot"
#    password: "sBWLquQApba8"


captive_portal:

# Definition der Sensoren für Home Assistant
sensor:
  - platform: template
    name: "Poolheizung Wassertemperatur"
    id: pool_wasser_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature

  - platform: template
    name: "Poolheizung Zieltemperatur"
    id: pool_ziel_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    device_class: temperature

  - platform: template
    name: "Poolheizung Außentemperatur"
    id: pool_aussen_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    device_class: temperature

  - platform: template
    name: "Poolheizung Interne Temperatur"
    id: pool_intern_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    device_class: temperature

binary_sensor:
  - platform: template
    name: "Poolheizung Power"
    id: pool_power_status
    device_class: power

text_sensor:
  - platform: template
    name: "Poolheizung Modus"
    id: pool_modus

switch:
  - platform: template
    name: "Poolheizung Power"
    id: pool_power_switch
    icon: "mdi:pool-thermometer"
    # Der Schalter zeigt den Status an, den wir von der Pumpe empfangen
    lambda: |-
      if (id(pool_power_status).state) return true;
      else return false;
    # Wenn man in HA auf "An" drückt:
    turn_on_action:
      - button.press: pumpe_ein_test
    # Wenn man in HA auf "Aus" drückt:
    turn_off_action:
      - button.press: pumpe_aus_test

logger:
  level: DEBUG 
  baud_rate: 0

remote_receiver:
  pin: 
    number: 18
    inverted: false
  idle: 65ms
  tolerance: 50%
  on_raw:
    then:
      - lambda: |-
          std::vector<uint8_t> bytes;
          uint8_t current_byte = 0;
          int bit_count = 0;
          if (x.size() < 20) return;

          int start_idx = -1;
          for (size_t i = 0; i < x.size() - 1; i++) {
            if (x[i] > -12000 && x[i] < -6000 && x[i+1] > 2000 && x[i+1] < 6000) {
              start_idx = i; break;
            }
          }

          if (start_idx != -1) {
            for (size_t i = start_idx + 2; i < x.size() - 1; i += 2) {
              if (x[i+1] > 500 && x[i+1] < 1500) {
                current_byte |= (0 << bit_count); bit_count++;
              } else if (x[i+1] > 2000 && x[i+1] < 4000) {
                current_byte |= (1 << bit_count); bit_count++;
              } else break;
              if (bit_count == 8) {
                bytes.push_back(current_byte);
                current_byte = 0; bit_count = 0;
              }
            }

            // Wenn wir ein komplettes 23-Byte Paket haben:
            if (bytes.size() == 23) {
              // 1. Modus (Byte 3 / Index 2)
              if (bytes[2] == 0x04) id(pool_modus).publish_state("Heizen");
              else if (bytes[2] == 0x01) id(pool_modus).publish_state("Kühlen");
              else id(pool_modus).publish_state("Unbekannt");

              // 2. Wassertemperatur (Byte 4 / Index 3)
              id(pool_wasser_temp).publish_state(bytes[3]);

              // 3. Zieltemperatur (Byte 5 / Index 4)
              id(pool_ziel_temp).publish_state(bytes[4]);

              // 4. Power Status (Byte 6 / Index 5)
              id(pool_power_status).publish_state(bytes[5] > 0);

              // 5. Außentemperatur (Byte 17 / Index 16)
              id(pool_aussen_temp).publish_state(bytes[16]);

              // 6. Interne Temperatur (Byte 18 / Index 17)
              id(pool_intern_temp).publish_state(bytes[17]);
            }
          }

remote_transmitter:
  pin: 
    number: 19
    # Inverted true bedeutet: In Ruhephase ist die Leitung auf HIGH, wir ziehen sie für Pulse auf LOW.
    inverted: true
  carrier_duty_percent: 100
  id: pumpe_tx

button:
  - platform: template
    name: "Pumpe EIN (Test)"
    id: pumpe_ein_test
    on_press:
      - lambda: |-
          ESP_LOGW("TX_SENDER", ">>> Berechne und feuere EIN-Befehl ab...");
          auto call = id(pumpe_tx).transmit();
          auto data = call.get_data();
          data->set_carrier_frequency(0);
          
          // Unser Basis-Paket (mit der kühleren Temperatur 17, die die Pumpe gerade gemeldet hat)
          // Wir setzen Byte 5 (Index 5) auf 0x01 für EIN!
          uint8_t pkt[23] = {0xDD, 0x00, 0x04, 0x11, 0x19, 0x01, 0xF9, 0x0D, 0x2D, 0x03, 0x8F, 0x8D, 0x5F, 0x07, 0x01, 0x06, 0x0C, 0x17, 0x0B, 0x02, 0x19, 0x23, 0x00};
          
          // Magie: Prüfsumme live berechnen (Summe von Index 1 bis 21)
          uint16_t sum = 0;
          for (int i = 1; i <= 21; i++) {
            sum += pkt[i];
          }
          pkt[22] = sum & 0xFF; // Modulo 256
          
          data->mark(9000);
          data->space(4500);

          for (int i=0; i<23; i++) {
            for (int bit=0; bit<8; bit++) {
              data->mark(1000);
              if ((pkt[i] >> bit) & 1) { 
                data->space(3000);
              } else {
                data->space(1000);
              }
            }
          }
          data->mark(1000); // Stopp-Puls
          call.perform();
          ESP_LOGW("TX_SENDER", ">>> EIN-Befehl erfolgreich gesendet!");

  - platform: template
    name: "Pumpe AUS (Test)"
    id: pumpe_aus_test
    on_press:
      - lambda: |-
          ESP_LOGW("TX_SENDER", ">>> Berechne und feuere AUS-Befehl ab...");
          auto call = id(pumpe_tx).transmit();
          auto data = call.get_data();
          data->set_carrier_frequency(0);
          
          // Byte 5 (Index 5) auf 0x00 für AUS
          uint8_t pkt[23] = {0xDD, 0x00, 0x04, 0x11, 0x19, 0x00, 0xF9, 0x0D, 0x2D, 0x03, 0x8F, 0x8D, 0x5F, 0x07, 0x01, 0x06, 0x0C, 0x17, 0x0B, 0x02, 0x19, 0x23, 0x00};
          
          uint16_t sum = 0;
          for (int i = 1; i <= 21; i++) {
            sum += pkt[i];
          }
          pkt[22] = sum & 0xFF; 
          
          data->mark(9000);
          data->space(4500);

          for (int i=0; i<23; i++) {
            for (int bit=0; bit<8; bit++) {
              data->mark(1000);
              if ((pkt[i] >> bit) & 1) {
                data->space(3000);
              } else {
                data->space(1000);
              }
            }
          }
          data->mark(1000); // Stopp-Puls
          call.perform();
          ESP_LOGW("TX_SENDER", ">>> AUS-Befehl erfolgreich gesendet!");
